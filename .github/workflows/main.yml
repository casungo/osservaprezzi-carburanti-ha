name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "17 2 * * *" # daily: live-api-contract
    - cron: "13 3 1,15 * *" # twice monthly (1st & 15th): home-assistant-docker
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install -r requirements-test.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Run coverage
        run: python -m coverage run --source=custom_components/osservaprezzi_carburanti -m pytest -q

      - name: Enforce 100% coverage
        run: python -m coverage report --fail-under=100

  static:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install -r requirements-test.txt

      - name: Run Ruff
        run: python -m ruff check .

      - name: Run mypy
        run: python -m mypy

  hassfest:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Validate with hassfest
        uses: home-assistant/actions/hassfest@f4ca6f671bd429efb108c0f2fa0ae8af0215986c # master

  validate-hacs:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: HACS validation
        uses: hacs/action@d556e736723344f83838d08488c983a15381059a # 22.5.0
        with:
          category: integration

  home-assistant-docker:
    if: github.event.schedule == '13 3 1,15 * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Run real Home Assistant Docker regression
        run: python scripts/ha_docker_regression.py

  live-api-contract:
    if: github.event.schedule == '17 2 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install -r requirements-test.txt

      - name: Run live upstream contract
        env:
          OSSERVAPREZZI_LIVE_API: "1"
        run: python -m pytest tests/test_live_api_contract.py -q
